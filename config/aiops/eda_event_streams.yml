# ansible-playbook pb_aap_config.yml --tags aiops,event_stream --skip-tags common
---
eda_event_streams_aiops:
  - name: DataDog Event Stream
    credential_name: DataDog Credential
    organization: Autodotes
    forward_events: true
  - name: Dynatrace Event Stream
    credential_name: Dynatrace Credential
    organization: Autodotes
    forward_events: true
  - name: Demo OAuth2 Event Stream
    credential_name: OAuth2 Event Stream Client
    organization: Autodotes
    forward_events: true
  - name: ServiceNow Event Stream
    credential_name: ServiceNow Webhook Token
    organization: Autodotes
    forward_events: true
