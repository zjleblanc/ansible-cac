# ansible-playbook pb_aap_config.yml --tags aiops,credential_types --skip-tags common
---
controller_credential_types_aiops:
  - name: OpenAI Config
    description: OpenAI / AI RCA API configuration for playbook extra vars and env lookups
    kind: cloud
    inputs:
      fields:
        - id: ai_rca_api_key
          label: API Key
          secret: true
          type: string
        - id: ai_rca_api_base
          label: API Base URL
          help_text: e.g. https://api.openai.com/v1
          type: string
          default: https://api.openai.com/v1
        - id: ai_rca_model
          label: Model
          type: string
          default: gpt-4o-mini
      required:
        - ai_rca_api_key
    injectors:
      env:
        AI_RCA_API_KEY: !unsafe "{{ ai_rca_api_key }}"
        OPENAI_API_KEY: !unsafe "{{ ai_rca_api_key }}"
        OPENAI_API_BASE: !unsafe "{{ ai_rca_api_base }}"
        AI_RCA_MODEL: !unsafe "{{ ai_rca_model }}"
      extra_vars:
        ai_rca_api_key: !unsafe "{{ ai_rca_api_key }}"
        ai_rca_api_base: !unsafe "{{ ai_rca_api_base }}"
        ai_rca_model: !unsafe "{{ ai_rca_model }}"
