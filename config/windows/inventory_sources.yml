# ansible-playbook pb_aap_config.yml --tags windows,inventory_sources --skip-tags common
---
controller_inventory_sources_windows:
  - credential: AWS Sandbox Credential
    description: ""
    enabled_value: ""
    enabled_var: ""
    execution_environment: ee-default
    host_filter: ""
    inventory: Windows Inventory
    limit: ""
    name: Windows EC2 Instances
    overwrite: true
    overwrite_vars: true
    scm_branch: ""
    source: ec2
    source_path: ""
    source_project:
    source_vars:
      aws_region: us-east-2
      compose:
        ansible_platform: platform
      filters:
        tag:role:
          - domain_controller
          - domain_computer
      hostnames:
        - tag:Name
      keyed_groups:
        - key: tags['role']
          prefix: role
    timeout: 0
    update_cache_timeout: 0
    update_on_launch: false
    verbosity: 1
