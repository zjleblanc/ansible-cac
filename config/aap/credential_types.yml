# ansible-playbook pb_aap_config.yml --tags aap,credential_types --skip-tags common
---
controller_credential_types_aap:
  - name: EE Build Credential
    description: for automation the execution environment build process
    kind: cloud
    inputs:
      fields:
        - id: base_registry_username
          label: RH registry Username
          type: string
        - id: base_registry_password
          label: RH registry Password
          secret: true
          type: string
        - id: ee_registry_username
          label: AH registry Username
          type: string
        - id: ee_registry_password
          label: AH registry Password
          secret: true
          type: string
        - id: ee_ah_host
          label: AH Hostname
          type: string
        - id: ee_ah_token
          label: AH Token
          secret: true
          type: string
        - default: false
          id: ee_validate_certs
          label: Validate certs
          type: boolean
      required:
        - base_registry_username
        - base_registry_password
    injectors:
      extra_vars:
        ah_host: !unsafe "{{ ee_ah_host }}"
        ah_token: !unsafe "{{ ee_ah_token }}"
        ee_base_registry_password: !unsafe "{{ base_registry_password }}"
        ee_base_registry_username: !unsafe "{{ base_registry_username }}"
        ee_registry_password: !unsafe "{{ ee_registry_password }}"
        ee_registry_username: !unsafe "{{ ee_registry_username }}"
        ee_validate_certs: !unsafe "{{ ee_validate_certs }}"
  - name: EE Utilities
    description: for use with the execution environment utilities collection
    kind: cloud
    inputs:
      fields:
        - id: ee_base_reg_user
          label: Base Registry Username
          type: string
        - id: ee_base_reg_password
          label: Base Registry Password
          secret: true
          type: string
        - help_text: "ex: quay.io/zleblanc"
          id: ee_dest_reg
          label: Destination Registry
          type: string
        - id: ee_dest_reg_user
          label: Destination Registry Username
          type: string
        - id: ee_dest_reg_password
          label: Destination Registry Password
          secret: true
          type: string
      required:
        - ee_base_reg_user
        - ee_base_reg_password
        - ee_dest_reg
        - ee_dest_reg_user
        - ee_dest_reg_password
    injectors:
      extra_vars:
        ee_base_reg_password: !unsafe "{{ ee_base_reg_password }}"
        ee_base_reg_user: !unsafe "{{ ee_base_reg_user }}"
        ee_dest_reg: !unsafe "{{ ee_dest_reg }}"
        ee_dest_reg_password: !unsafe "{{ ee_dest_reg_password }}"
        ee_dest_reg_user: !unsafe "{{ ee_dest_reg_user }}"
  - name: Private Automation Hub
    description: For integration with the PAH API via ansible.hub collection
    kind: cloud
    inputs:
      fields:
        - id: pah_host
          label: Host
          type: string
        - id: pah_username
          label: Username
          type: string
        - id: pah_password
          label: Password
          secret: true
          type: string
        - id: pah_token
          label: Token
          secret: true
          type: string
        - id: pah_verify_ssl
          label: Verify SSL?
          type: boolean
      required:
        - pah_host
    injectors:
      env:
        AH_API_TOKEN: !unsafe "{{ pah_token }}"
        AH_HOST: !unsafe "{{ pah_host }}"
        AH_PASSWORD: !unsafe "{{ pah_password }}"
        AH_USERNAME: !unsafe "{{ pah_username }}"
        AH_VERIFY_SSL: !unsafe "{{ pah_verify_ssl }}"
        PAH_HOST: !unsafe "{{ pah_host }}"
        PAH_PASSWORD: !unsafe "{{ pah_password }}"
        PAH_TOKEN: !unsafe "{{ pah_token }}"
        PAH_USERNAME: !unsafe "{{ pah_username }}"
        PAH_VERIFY_SSL: !unsafe "{{ pah_verify_ssl }}"
  - name: Ansible Support Analyzer
    organization: Autodotes
    description: >-
      API tokens, LLM endpoint settings, and Google Sheets credentials for the
      ansible-support-analyzer playbook. Writes the service account key to a temp
      file and sets GOOGLE_SA_CRED_PATH for the gsheet_update module.
    kind: cloud
    inputs:
      fields:
        - id: redhat_offline_token
          type: string
          label: Red Hat offline token
          secret: true
          help_text: >-
            Offline token from https://access.redhat.com/management/api
        - id: llm_api_key
          type: string
          label: LLM API key
          secret: true
          help_text: >-
            Use EMPTY for local OpenAI-compatible servers without auth
        - id: llm_api_base_url
          type: string
          label: LLM API base URL
          help_text: >-
            e.g. https://api.openai.com/v1 or http://localhost:8000/v1
        - id: llm_model
          type: string
          label: LLM model name
          help_text: Model identifier for llm_summarize (maps to LLM_MODEL).
        - id: google_service_account_json
          type: string
          label: Google service account JSON
          secret: true
          multiline: true
          help_text: >-
            Full contents of the service account key file. Materialized at job
            runtime; path exposed as GOOGLE_SA_CRED_PATH for gsheet_update.
        - id: google_sheet_id
          type: string
          label: Google spreadsheet ID
          help_text: Spreadsheet ID from the Google Sheets URL
        - id: gsheet_sheet
          type: string
          label: Default worksheet name
          default: Accounts
          help_text: Default gsheet_update sheet when not set per account
        - id: gsheet_lookup_column
          type: string
          label: Default lookup column
          help_text: Column letter to find the account row
        - id: gsheet_update_column
          type: string
          label: Default update column
          help_text: Column letter for the JSON report payload.
      required:
        - redhat_offline_token
        - llm_api_key
        - llm_api_base_url
        - llm_model
        - google_service_account_json
        - google_sheet_id
        - gsheet_lookup_column
        - gsheet_update_column
    injectors:
      env:
        REDHAT_OFFLINE_TOKEN: !unsafe "{{ redhat_offline_token }}"
        LLM_API_KEY: !unsafe "{{ llm_api_key }}"
        LLM_API_BASE_URL: !unsafe "{{ llm_api_base_url }}"
        LLM_MODEL: !unsafe "{{ llm_model }}"
        GOOGLE_SA_CRED_PATH: !unsafe "{{ tower.filename }}"
        GOOGLE_SHEET_ID: !unsafe "{{ google_sheet_id }}"
        GSHEET_SHEET: !unsafe "{{ gsheet_sheet }}"
        GSHEET_LOOKUP_COLUMN: !unsafe "{{ gsheet_lookup_column }}"
        GSHEET_UPDATE_COLUMN: !unsafe "{{ gsheet_update_column }}"
      file:
        template: !unsafe "{{ google_service_account_json }}"
