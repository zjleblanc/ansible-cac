# ansible-playbook pb_aap_config.yml --tags linux,workflow_job_templates --skip-tags common
---
controller_workflows_linux:
  - name: Linux // Patching // rhel9_3
    organization: Autodotes
    allow_simultaneous: true
    ask_variables_on_launch: true
    ask_labels_on_launch: true
    workflow_nodes:
      - identifier: Sync Project
        related:
          success_nodes:
            - identifier: Create Snapshot
        unified_job_template:
          name: Linux Mgmt
          organization:
            name: Autodotes
            type: organization
          type: project
      - identifier: Sync Inventory
        related:
          success_nodes:
            - identifier: Create Snapshot
        unified_job_template:
          inventory:
            name: Cloud Inventory
            organization:
              name: Autodotes
              type: organization
            type: inventory
          name: AWS EC2 Instances
          type: inventory_source
      - identifier: Create Snapshot
        related:
          success_nodes:
            - identifier: Patch
          failure_nodes:
            - identifier: Update CR Task
        unified_job_template:
          name: Linux // Patching // No-Op
          organization:
            name: Autodotes
            type: organization
          type: job_template
        extra_data:
          task_purpose: Create a snapshot before patching
          task_output:
            action: create_snapshot
            snapshot_id: snap_xyz
      - identifier: Patch
        related:
          success_nodes:
            - identifier: Post-Validation
          failure_nodes:
            - identifier: Update CR Task
        unified_job_template:
          name: Linux // Patching // No-Op
          organization:
            name: Autodotes
            type: organization
          type: job_template
        extra_data:
          task_purpose: Patch the target host
          task_output:
            action: patch
            results:
              packages:
                httpd: v1
                bind: v2
      - identifier: Post-Validation
        related:
          success_nodes:
            - identifier: Close CR Task
          failure_nodes:
            - identifier: Update CR Task
        unified_job_template:
          name: Linux // Patching // No-Op
          organization:
            name: Autodotes
            type: organization
          type: job_template
        extra_data:
          report_status_update: Success
          task_purpose: Complete post-validation of patched host
          task_output:
            action: post_validation
            success: true
      - identifier: Close CR Task
        unified_job_template:
          name: Linux // Patching // No-Op
          organization:
            name: Autodotes
            type: organization
          type: job_template
        extra_data:
          task_purpose: Close CR Task
          task_output:
            action: close_ctask
            ctask_num: CTASK123
            ctask_sys_id: asdas9r70213u1ji321
      - identifier: Update CR Task
        unified_job_template:
          name: Linux // Patching // No-Op
          organization:
            name: Autodotes
            type: organization
          type: job_template
        extra_data:
          report_status_update: Failed
          task_purpose: Update CR Task
          task_output:
            action: update_ctask
            ctask_num: CTASK123
            ctask_sys_id: asdas9r70213u1ji321
