  - name: Linux // Debug Workflow
    inventory: Autodotes Lab
    workflow_nodes:
      - identifier: Debug Variables
        unified_job_template:
          name: Linux // Debug
          organization:
            name: Autodotes
            type: organization
          type: job_template
  - name: Linux // User Login (Random) Workflow
    organization: Autodotes
    workflow_nodes:
      - identifier: Sync Project
        related:
          success_nodes:
            - identifier: Start VMs
        unified_job_template:
          name: Linux Mgmt
          organization:
            name: Autodotes
            type: organization
          type: project
      - identifier: Start VMs
        related:
          failure_nodes:
            - identifier: Stop VMs
          success_nodes:
            - identifier: User Login
        unified_job_template:
          name: Proxmox // Manage Instance State
          organization:
            name: Autodotes
            type: organization
          type: job_template
        extra_data:
          proxmox_kvms:
            - node: nuc
              name: camp
              state: started
            - node: fedora-master
              name: fedora
              state: started
      - identifier: Stop VMs
        unified_job_template:
          name: Proxmox // Manage Instance State
          organization:
            name: Autodotes
            type: organization
          type: job_template
        extra_data:
          proxmox_kvms:
            - node: nuc
              name: camp
              state: stopped
      - identifier: User Login
        related:
          always_nodes:
            - identifier: Restore VM State
        unified_job_template:
          name: Linux // User Login (Random)
          organization:
            name: Autodotes
            type: organization
          type: job_template
      - identifier: Restore VM State
        unified_job_template:
          name: Proxmox // Manage Instance State
          organization:
            name: Autodotes
            type: organization
          type: job_template
        extra_data:
          proxmox_kvms:
            - node: nuc
              name: camp
              state: stopped
  - name: Linux // User Login Report Workflow
    organization: Autodotes
    workflow_nodes:
      - identifier: Project Sync
        related:
          success_nodes:
            - identifier: Start VMs
        unified_job_template:
          name: Linux Mgmt
          organization:
            name: Autodotes
            type: organization
          type: project
      - identifier: Start VMs
        related:
          failure_nodes:
            - identifier: Stop VMs
          success_nodes:
            - identifier: Generate Report
        unified_job_template:
          name: Proxmox // Manage Instance State
          organization:
            name: Autodotes
            type: organization
          type: job_template
        extra_data:
          proxmox_kvms:
            - node: nuc
              name: camp
              state: started
            - node: fedora-master
              name: fedora
              state: started
      - identifier: Generate Report
        related:
          always_nodes:
            - identifier: Stop VMs
        unified_job_template:
          name: Linux // User Login Report
          organization:
            name: Autodotes
            type: organization
          type: job_template
      - identifier: Stop VMs
        unified_job_template:
          name: Proxmox // Manage Instance State
          organization:
            name: Autodotes
            type: organization
          type: job_template
        extra_data:
          proxmox_kvms:
            - node: nuc
              name: camp
              state: stopped
  - name: RHEL // Provision RHEL SQL Server Host
    organization: Autodotes
    description: Provision a guest in proxmox, register with subscription-manager, and install sql server
    inventory: Proxmox Inventory
    limit: "*.rhel-guest"
    workflow_nodes:
      - identifier: 4cfd736f-cc84-4a0c-90b6-7e7e83c6dea8
        related:
          success_nodes:
            - identifier: Provision Guest Host
        unified_job_template:
          name: Linux Mgmt
          organization:
            name: Autodotes
            type: organization
          type: project
      - identifier: Provision Guest Host
        related:
          success_nodes:
            - identifier: Register RHEL Guest
        unified_job_template:
          name: Proxmox // Provision KVM Guest
          organization:
            name: Autodotes
            type: organization
          type: job_template
      - identifier: Install SQL Server
        limit: "*.rhel-guest"
        unified_job_template:
          name: RHEL // Install SQL Server
          organization:
            name: Autodotes
            type: organization
          type: job_template
      - identifier: Register RHEL Guest
        limit: "*.rhel-guest"
        related:
          success_nodes:
            - identifier: Install SQL Server
        unified_job_template:
          name: RHEL // Register
          organization:
            name: Autodotes
            type: organization
          type: job_template
