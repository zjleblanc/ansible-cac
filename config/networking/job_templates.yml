# ansible-playbook pb_aap_config.yml --tags networking,job_templates --skip-tags common
---
controller_templates_networking:
  - name: Networking // Cisco Compliance
    labels:
      - Network
    project: Network Mgmt
    playbook: workshop-addons/cisco_compliance.yml
    inventory: Cisco Lab
    credentials:
      - AAP (zach)
    job_type: run
    job_slice_count: 1
  - name: Networking // Cisco EOX Lifecycle
    labels:
      - Network
    project: Network Mgmt
    playbook: workshop-addons/cisco_lifecycle.yml
    inventory: Cisco Lab
    execution_environment: ee-networking
    credentials:
      - AAP (zach)
    job_type: run
    job_slice_count: 1
  - name: Networking // Cisco Upgrade (ios)
    labels:
      - Network
    project: Network Mgmt
    playbook: workshop-addons/cisco_upgrade.yml
    inventory: Cisco Lab
    execution_environment: Control Plane Execution Environment
    credentials:
      - Eve-NG (admin)
    job_type: run
    job_slice_count: 1
    verbosity: 3
    limit: router_two
    ask_limit_on_launch: true
    survey_spec:
      description: ""
      name: ""
      spec:
        - choices: ""
          default: ios
          max: 1024
          min: 0
          new_question: true
          question_description: ""
          question_name: Specify target hosts
          required: true
          type: text
          variable: _hosts
  - name: Networking // Cisco VLAN ACLs
    labels:
      - Network
    project: Network Mgmt
    playbook: workshop-addons/cisco_vlan_acls.yml
    inventory: Cisco Lab
    execution_environment: ee-networking
    job_type: run
    job_slice_count: 1
  - name: Networking // Dynatrace -> ServiceNow CMDB
    labels:
      - Network
    project: Network Mgmt
    playbook: playbooks/dynatrace_snow_cmdb.yml
    inventory: Proxmox Inventory
    execution_environment: Default execution environment
    credentials:
      - West ServiceNow (ven07621)
    job_type: run
    job_slice_count: 1
    ask_variables_on_launch: true
    extra_vars:
      record_limit: 5
  - name: Networking // Golden Configs
    labels:
      - Network
    project: Network Mgmt
    playbook: playbooks/network_config.yml
    inventory: Cisco Lab
    execution_environment: ee-networking
    job_type: run
    job_slice_count: 1
    survey_enabled: true
    survey_spec:
      description: ""
      name: ""
      spec:
        - choices: ""
          default: ios-sbox
          max: 1024
          min: 0
          new_question: true
          question_description: ""
          question_name: Specify target hosts
          required: true
          type: text
          variable: _hosts
  - name: Networking // Label CDP Neighbors
    labels:
      - Network
    project: Network Mgmt
    playbook: playbooks/label_cdp_neighbors.yml
    inventory: Cisco Lab
    execution_environment: ee-networking
    job_type: run
    job_slice_count: 1
  - name: Networking // MS O365 ACLs
    labels:
      - Network
    project: Network Mgmt
    playbook: playbooks/o365_acls.yml
    inventory: Cisco Lab
    execution_environment: ee-networking
    job_type: run
    job_slice_count: 1
  - name: Palo Alto // Configure Firewall
    labels:
      - Network
    project: Network Mgmt
    playbook: demos/panos/pb_firewall_configure.yml
    inventory: Palo Alto Demo Inventory
    execution_environment: ee-default
    credentials:
      - Palo Alto Demo Vault
      - Palo Alto Firewall (admin)
    job_type: run
    job_slice_count: 1
    ask_variables_on_launch: true
  - name: Palo Alto // Firewall Security Rule
    labels:
      - Network
    project: Network Mgmt
    playbook: demos/panos/pb_panos_security_rule.yml
    inventory: Palo Alto Demo Inventory
    execution_environment: ee-default
    credentials:
      - Palo Alto Firewall (admin)
      - West ServiceNow (ven07621)
    job_type: run
    job_slice_count: 1
    ask_variables_on_launch: true
    extra_vars:
      panos_commit: false
  - name: Palo Alto // Setup Infrastructure
    labels:
      - Network
    project: Network Mgmt
    playbook: demos/panos/pb_infra_setup.yml
    inventory: Palo Alto Demo Inventory
    execution_environment: ee-default
    credentials:
      - AWS Sandbox Credential
      - Controller Credential
      - Palo Alto Bastion
      - Palo Alto Demo Vault
      - West ServiceNow (ven07621)
    job_type: run
    job_slice_count: 1
    survey_enabled: true
    survey_spec:
      description: ""
      name: ""
      spec:
        - choices: ""
          default: us-east-2
          max: 1024
          min: 0
          new_question: true
          question_description: ""
          question_name: AWS region
          required: true
          type: text
          variable: aws_region
        - choices:
            - "true"
            - "false"
          default: "false"
          max: 1024
          min: 0
          new_question: true
          question_description: ""
          question_name: Skip admin user setup?
          required: true
          type: multiplechoice
          variable: skip_fw_password
  - name: Palo Alto // Tear Down Infrastructure
    labels:
      - Network
    project: Network Mgmt
    playbook: demos/panos/pb_infra_teardown.yml
    inventory: Palo Alto Demo Inventory
    execution_environment: ee-default
    credentials:
      - AWS Sandbox Credential
    job_type: run
    job_slice_count: 1
    extra_vars:
      aws_region: us-east-2
  - name: Palo Alto // Web Server Setup
    labels:
      - Network
    project: Network Mgmt
    playbook: demos/panos/pb_webserver_setup.yml
    inventory: Palo Alto Demo Inventory
    execution_environment: ee-default
    credentials:
      - Palo Alto Bastion
    job_type: run
    job_slice_count: 1
    ask_variables_on_launch: true
  - name: Summit Connect // Apply Network CaC
    labels:
      - Network
    project: Network Mgmt
    playbook: summit-connect/playbooks/network_apply_cac.yml
    inventory: Cisco Lab
    execution_environment: ee-networking
    credentials:
      - Git Role Credential
    job_type: run
    job_slice_count: 1
    ask_variables_on_launch: true
  - name: Summit Connect //  Network Apply Configs
    labels:
      - Network
    project: Network Mgmt
    playbook: summit-connect/playbooks/network_apply_config.yml
    inventory: Cisco Lab
    execution_environment: ee-networking
    job_type: run
    job_slice_count: 1
    limit: sandbox-iosxe-latest-1.cisco.com
    ask_variables_on_launch: true
    ask_limit_on_launch: true
    extra_vars:
      network_configs:
        interfaces:
          - description: Mgmt INTERFACE - DON'T TOUCH ME
            enabled: true
            name: GigabitEthernet1
          - description: Port to Fabric (edit 2 -> ansible)
            enabled: true
            name: GigabitEthernet2
    survey_enabled: true
    survey_spec:
      description: ""
      name: ""
      spec:
        - choices: ""
          default: sandbox-iosxe-latest-1.cisco.com
          max: 1024
          min: 0
          new_question: true
          question_description: ""
          question_name: Specify target hosts
          required: true
          type: text
          variable: _hosts
  - name: Summit Connect // Network Backup
    labels:
      - Network
    project: Network Mgmt
    playbook: summit-connect/playbooks/network_backup.yml
    inventory: Cisco Lab
    credentials:
      - Controller Credential
      - Git Role Credential
    job_type: run
    job_slice_count: 1
    ask_variables_on_launch: true
    extra_vars:
      config_repo_name: ansible-network-configs
    survey_enabled: true
    survey_spec:
      description: ""
      name: ""
      spec:
        - choices: ""
          default: backup_demo
          max: 1024
          min: 0
          new_question: false
          question_description: ""
          question_name: Specify target host(s)
          required: true
          type: text
          variable: _hosts
  - name: Summit Connect // Network Restore
    labels:
      - Network
    project: Network Mgmt
    playbook: summit-connect/playbooks/network_restore.yml
    inventory: Cisco Lab
    execution_environment: ee-networking
    credentials:
      - Controller Credential
      - Git Role Credential
    job_type: run
    job_slice_count: 1
    ask_variables_on_launch: true
    extra_vars:
      config_repo_name: ansible-network-configs
    survey_enabled: true
    survey_spec:
      description: Prompt user for restore point based on backup configs available in git
      name: Network Restore Survey
      spec:
        - default: sandbox-iosxe-latest-1.cisco.com
          question_name: Specify target hosts
          required: true
          type: text
          variable: _hosts
        - choices:
            - 2024.10.23.19.26.18
            - 2024.10.23.14.58.54
            - 2024.10.22.20.03.49
            - 2024.09.24.15.56.18
            - 2024.09.16.21.49.39
            - 2024.07.09.19.40.18
            - 2024.07.09.16.21.45
            - 2024.07.09.16.12.57
            - 2024.06.25.15.50.40
            - 2024.06.24.18.21.33
            - 2023.10.13.14.49.27
            - 2023.10.11.21.32.00
            - 2023.10.11.15.21.11
            - 2023.10.03.17.20.31
            - 2023.10.03.16.32.37
            - 2023.10.03.13.33.52
            - 2023.10.03.13.26.03
            - 2023.10.03.12.57.55
            - 2023.10.03.12.32.47
            - 2023.10.02.20.31.15
            - 2023.10.02.08.10.32
            - 2023.09.30.00.02.05
            - 2023.09.29.19.20.27
            - 2023.09.29.13.33.33
            - 2023.09.29.08.54.44
            - 2023.09.29.08.52.53
            - 2023.09.29.08.50.30
            - 2023.09.29.08.47.15
            - 2023.09.29.08.45.02
            - 2023.09.28.21.58.40
            - 2023.09.28.21.51.18
            - 2023.09.28.21.32.55
            - 2023.09.28.21.29.11
            - 2023.09.28.21.25.10
            - 2023.09.28.21.04.52
            - 2023.09.28.15.43.41
            - 2023.09.28.15.07.44
            - 2023.09.28.14.59.25
            - 2023.09.27.22.15.47
            - 2023.09.27.22.13.00
            - 2023.09.27.22.03.38
            - 2023.09.27.21.52.22
          default: 2024.10.23.19.26.18
          question_description: Each backup commit is tagged with the time it was created
          question_name: Choose your restore point (git tag)
          required: true
          type: multiplechoice
          variable: backup_config_tag
  - name: Summit Connect // Setup
    labels:
      - Network
    project: Network Mgmt
    playbook: summit-connect/setup.yml
    inventory: Cisco Lab
    execution_environment: ee-networking
    credentials:
      - Controller Credential
    job_type: run
    job_slice_count: 1
    ask_variables_on_launch: true
    extra_vars:
      input_slack_token: REPLACE_ME
  - name: Summit Connect // Slack Notification
    labels:
      - Network
    project: Network Mgmt
    playbook: summit-connect/playbooks/slack_notification.yml
    inventory: Cisco Lab
    credentials:
      - Personal Slack Token
    job_type: run
    job_slice_count: 1
    ask_variables_on_launch: true
