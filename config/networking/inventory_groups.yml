# ansible-playbook pb_aap_config.yml --tags networking,host_groups --skip-tags common
---
controller_groups_networking:
  - name: role_webserver
    inventory: Palo Alto Demo Inventory
    description: webserver host(s) in Palo Alto demo
    preserve_existing_hosts: true
    preserve_existing_children: true
    variables:
      ansible_ssh_private_key_file: !unsafe "{{ lookup('env', 'SSH_PROXY_KEY') }}"
      ansible_ssh_common_args: !unsafe >-
        -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ProxyCommand="ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null  -i {{ lookup('env', 'SSH_PROXY_KEY') }} -W %h:%p -q {{ ssh_proxy_username }}@{{ ssh_proxy_host }}"
